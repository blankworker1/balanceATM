<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blink API Test — Send Sats</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h2 { color: #333; }
    label { display: block; margin-top: 16px; font-weight: bold; color: #555; font-size: 14px; }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }
    button {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      background: #f7931a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #e07d10; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      white-space: pre-wrap;
      display: none;
    }
    .success { background: #d4edda; border: 1px solid #28a745; color: #155724; }
    .error   { background: #f8d7da; border: 1px solid #dc3545; color: #721c24; }
    .note { margin-top: 16px; font-size: 13px; color: #888; }
  </style>
</head>
<body>

  <h2>⚡ Blink Send Test</h2>
  <p style="color:#555; font-size:14px;">Sends sats from your ATM wallet to any Lightning address. Use this to validate the API before building anything.</p>

  <label>ATM Wallet API Key</label>
  <input type="password" id="apiKey" placeholder="Paste your API key here" />

  <label>ATM Wallet ID</label>
  <input type="text" id="walletId" placeholder="Paste your wallet ID (long hex string)" />

  <label>Destination Lightning Address</label>
  <input type="text" id="lnAddress" placeholder="e.g. alice@blink.sv" />

  <label>Amount (sats)</label>
  <input type="number" id="amount" value="21" min="1" />

  <button id="sendBtn" onclick="sendSats()">Send Sats ⚡</button>

  <div id="result"></div>

  <p class="note">⚠️ This sends real sats. Start with 21 to test. Nothing is stored — this page makes one API call and shows the result.</p>

<script>
async function sendSats() {
  const apiKey   = document.getElementById('apiKey').value.trim();
  const walletId = document.getElementById('walletId').value.trim();
  const lnAddress = document.getElementById('lnAddress').value.trim();
  const amount   = parseInt(document.getElementById('amount').value);
  const result   = document.getElementById('result');
  const btn      = document.getElementById('sendBtn');

  if (!apiKey || !walletId || !lnAddress || !amount) {
    showResult('Please fill in all fields.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending…';
  result.style.display = 'none';

  const mutation = `
    mutation SendToLnAddress($input: LnAddressPaymentSendInput!) {
      lnAddressPaymentSend(input: $input) {
        status
        errors {
          message
          code
        }
      }
    }
  `;

  const variables = {
    input: {
      walletId,
      lnAddress,
      amount
    }
  };

  try {
    const response = await fetch('https://api.blink.sv/graphql', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-KEY': apiKey
      },
      body: JSON.stringify({ query: mutation, variables })
    });

    const data = await response.json();

    if (data.errors) {
      showResult('GraphQL error:\n' + JSON.stringify(data.errors, null, 2), 'error');
      return;
    }

    const res = data.data.lnAddressPaymentSend;

    if (res.errors && res.errors.length > 0) {
      showResult('Payment error:\n' + res.errors.map(e => e.message).join('\n'), 'error');
      return;
    }

    if (res.status === 'SUCCESS') {
      showResult(`✅ SUCCESS\n\nStatus: ${res.status}\n\nSats sent: ${amount}\nTo: ${lnAddress}\n\nThe API call works. You can build the ATM around this.`, 'success');
    } else {
      showResult(`⚠️ Unexpected status: ${res.status}\n\nFull response:\n` + JSON.stringify(data, null, 2), 'error');
    }

  } catch (err) {
    showResult('Network error:\n' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Sats ⚡';
  }
}

function showResult(msg, type) {
  const el = document.getElementById('result');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}
</script>

</body>
</html>
