<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blink — Find Wallet ID</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h2 { color: #333; }
    p { color: #555; font-size: 14px; }
    label { display: block; margin-top: 16px; font-weight: bold; color: #555; font-size: 14px; }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }
    button {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      background: #f7931a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #e07d10; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .success { background: #d4edda; border: 1px solid #28a745; color: #155724; }
    .error   { background: #f8d7da; border: 1px solid #dc3545; color: #721c24; }
    .wallet-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
    }
    .wallet-id {
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      background: #f0f0f0;
      padding: 6px 8px;
      border-radius: 4px;
      margin-top: 4px;
      cursor: pointer;
      border: 1px solid #ccc;
    }
    .wallet-id:hover { background: #e0e0e0; }
    .copy-hint { font-size: 11px; color: #888; margin-top: 3px; }
  </style>
</head>
<body>

  <h2>⚡ Step 1 — Find Your Wallet ID</h2>
  <p>Paste your Blink API key below. This will fetch the wallet IDs associated with that key so you can use the correct one when sending payments.</p>

  <label>Blink API Key</label>
  <input type="password" id="apiKey" placeholder="Paste your API key here" />

  <button id="lookupBtn" onclick="lookupWallets()">Look Up Wallet IDs</button>

  <div id="result"></div>

<script>
async function lookupWallets() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const result = document.getElementById('result');
  const btn    = document.getElementById('lookupBtn');

  if (!apiKey) {
    showResult('Please paste your API key.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Looking up…';
  result.style.display = 'none';

  const query = `
    query GetWallets {
      me {
        defaultAccount {
          id
          wallets {
            id
            walletCurrency
            balance
          }
        }
      }
    }
  `;

  try {
    const response = await fetch('https://api.blink.sv/graphql', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-KEY': apiKey
      },
      body: JSON.stringify({ query })
    });

    const data = await response.json();

    if (data.errors) {
      showResult('API error:\n' + data.errors.map(e => e.message).join('\n'), 'error');
      return;
    }

    const wallets = data.data.me.defaultAccount.wallets;
    const accountId = data.data.me.defaultAccount.id;

    let html = `<div class="success" style="padding:12px; border-radius:8px; border:1px solid #28a745; background:#d4edda; color:#155724;">`;
    html += `<strong>✅ Found ${wallets.length} wallet(s)</strong><br><br>`;
    html += `<strong>Account ID:</strong><div class="wallet-id" onclick="copyText(this)" title="Click to copy">${accountId}</div>`;
    html += `<div class="copy-hint">👆 Click to copy</div><br>`;

    wallets.forEach(w => {
      html += `<div class="wallet-card">`;
      html += `<strong>${w.walletCurrency} Wallet</strong> — Balance: ${w.balance} sats<br>`;
      html += `<strong>Wallet ID:</strong>`;
      html += `<div class="wallet-id" onclick="copyText(this)" title="Click to copy">${w.id}</div>`;
      html += `<div class="copy-hint">👆 Click to copy — use this in the Send Test page</div>`;
      html += `</div>`;
    });

    html += `</div>`;

    result.innerHTML = html;
    result.style.display = 'block';

  } catch (err) {
    showResult('Network error:\n' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Look Up Wallet IDs';
  }
}

function copyText(el) {
  navigator.clipboard.writeText(el.textContent).then(() => {
    const orig = el.textContent;
    el.textContent = '✅ Copied!';
    setTimeout(() => el.textContent = orig, 1500);
  });
}

function showResult(msg, type) {
  const el = document.getElementById('result');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}
</script>

</body>
</html>
